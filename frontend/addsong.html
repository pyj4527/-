<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEON-YUL Add Song</title>
    <link rel="stylesheet" href="css/addsong.css">
    <script defer src="js/data.js"></script>
    <script defer src="js/api.js"></script>
    <script defer src="js/addsong.js"></script>
</head>
<body>
    <main class="addsong-page" aria-label="노래 추가하기 화면">
        <header class="status-bar" aria-label="상태 표시줄">
            <span></span>
        </header>

        <section class="addsong-content">
            <a class="back-link" href="player.html" aria-label="이전 화면으로 이동">
                <span aria-hidden="true">
                    <img src="images/icon/Left 2.png" alt="">
                </span>
                <span id="formTitle">노래 추가하기</span>
            </a>

            <div class="place-meta">
                <p>Place in <strong>SEON-YUL</strong></p>
                <div class="rule"></div>
                <h1><span id="addsongPlaceName">경복궁</span> <span id="addsongPlaceEnglish">Gyeongbokgung</span></h1>
            </div>

            <form class="song-form">
                <label class="title-field">
                    <input id="songTitleInput" type="text" aria-label="노래 제목" placeholder="노래를 추가해주세요">
                </label>

                <label class="file-field">
                    <span id="fileNameText">파일을 올려주세요</span>
                    <input id="songFileInput" type="file" accept="audio/*">
                </label>
                <button id="deleteSongButton" class="delete-song-button" type="button" hidden>삭제</button>
                <button id="uploadButton" class="upload-button" type="button">파일 업로드</button>

                <label class="description-field">
                    <span>설명을 작성해주세요</span>
                    <textarea id="songDescriptionInput" aria-label="노래 설명"></textarea>
                </label>
            </form>
        </section>

        <footer class="addsong-footer">
            <button id="saveSongButton" type="button">노래 저장하기</button>
            <span aria-hidden="true"></span>
        </footer>
    </main>
</body>
</html>
