<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seoulody - 로그인</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="app-container">
    <div class="login-content">
      <h1 class="login-title">로그인</h1>

      <form id="login-form">
        <input type="text" id="user-id" class="input-field" placeholder="아이디" autocomplete="off" required>
        <input type="password" id="user-pw" class="input-field" placeholder="비밀번호" required>
        <button type="submit" id="login-btn" class="submit-btn">로그인</button>
      </form>

      <div class="find-signup-area">
        <button type="button" class="find-btn" id="btn-find-account">아이디/비밀번호 찾기</button>
        <span class="vertical-bar">|</span>
        <a href="../signup/terms.html" class="signup-link-btn" id="btn-go-signup">회원가입</a>
      </div>
      <hr class="divider">

      <div class="sns-login-group">
        <img src="../images/kakao.png" alt="카카오 로그인" class="sns-btn" id="kakao-login">
        <img src="../images/google.png" alt="구글 로그인" class="sns-btn" id="google-login">
        <img src="../images/naver.png" alt="네이버 로그인" class="sns-btn" id="naver-login">
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>

  <script src="../login/login.js"></script>
</body>
</html>
