<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서울의 선율 - 마이페이지</title>
  <link rel="stylesheet" href="mypage.css">
</head>
<body>

  <div class="app-container">

    <div class="page-header">
      <h1 class="page-title">마이페이지</h1>
    </div>

    <div class="main-content">
      
      <div class="profile-section setting-group">
        <div class="profile-circle">
          <button class="edit-btn">✏️</button>
        </div>
        <h2 class="profile-name">홍길동</h2>
      </div>

      <div class="setting-group">
        <h3>앱 설정</h3>
        <ul>
          <li>MY SEON-YUL 관리</li>
          <li>댓글 관리</li>
          <li>알림 설정</li>
          <li>지도 설정</li>
          <li id="languageSetting" class="flex-row language-setting">
            <span>언어 설정</span>
            <span id="selectedLanguage" class="selected-language">한국어</span>
          </li>
        </ul>
      </div>

      <div class="setting-group">
        <h3>계정</h3>
        <ul>
          <li>내 아이디</li>
          <li>비밀번호 변경</li>
          <li>이메일 변경</li>
        </ul>
      </div>

      <div class="setting-group">
        <h3>약관 및 정책</h3>
        <ul>
          <li class="flex-row"><span>앱 버전</span><span class="version-text">1.1.1</span></li>
          <li>서비스 이용약관</li>
          <li>개인정보 처리 방침</li>
          <li>오픈소스 정보</li>
        </ul>
      </div>

      <div class="setting-group">
        <h3>고객 지원</h3>
        <ul>
          <li>문의하기</li>
          <li>공지사항</li>
          <li>도움말</li>
        </ul>
      </div>

      <div class="setting-group">
        <h3>기타</h3>
        <ul>
          <li>회원 탈퇴</li>
          <li>로그아웃</li>
        </ul>
      </div>

       </div>
    <div id="languageSheet" class="language-sheet hidden" aria-hidden="true">
      <div class="language-panel" role="dialog" aria-modal="true" aria-labelledby="languageTitle">
        <div class="language-header">
          <h3 id="languageTitle">언어 설정</h3>
          <button id="languageClose" class="language-close" type="button" aria-label="닫기">×</button>
        </div>
        <button class="language-option" type="button" data-language="한국어">한국어</button>
        <button class="language-option" type="button" data-language="English">English</button>
        <button class="language-option" type="button" data-language="日本語">日本語</button>
        <button class="language-option" type="button" data-language="中国人">中国人</button>
      </div>
    </div>
    <nav class="bottom-nav" aria-label="하단 메뉴">
      <a href="../main/main.html">
        <span class="nav-icon" aria-hidden="true"><img src="../images/icon/Home.png" alt=""></span>
        홈
      </a>
      <a href="../map/map.html">
        <span class="nav-icon" aria-hidden="true"><img src="../images/icon/Group 241.png" alt=""></span>
        지도
      </a>
      <a class="center-action" href="../player.html" aria-label="SEON-YUL 플레이어">
        <img src="../images/icon/Frame 2117904858.png" alt="">
        SEON-YUL
      </a>
      <a href="../save.html">
        <span class="nav-icon" aria-hidden="true"><img src="../images/icon/Bookmark.png" alt=""></span>
        저장
      </a>
      <a class="active" href="mypage.html">
        <span class="nav-icon" aria-hidden="true"><img src="../images/icon/User.png" alt=""></span>
        마이
      </a>
    </nav>

  </div>

  </div>

    <script src="mypage.js"></script>
</body>
</html>
